service: sinapsis-backend
frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  timeout: 30
  environment:
    # Variables de Base de Datos
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_USERNAME: ${env:DB_USERNAME}
    DB_PASSWORD: ${env:DB_PASSWORD}
    DB_NAME: ${env:DB_NAME}
    DB_SYNCHRONIZE: ${env:DB_SYNCHRONIZE}
    
    # Variables de Swagger (Mapeo nuevo)
    SWAGGER_TITLE: ${env:SWAGGER_TITLE}
    SWAGGER_DESCRIPTION: ${env:SWAGGER_DESCRIPTION}
    SWAGGER_VERSION: ${env:SWAGGER_VERSION}
    SWAGGER_PATH: ${env:SWAGGER_PATH}

functions:
  main:
    handler: dist/main.handler
    events:
      - http:
          method: ANY
          path: /
      - http:
          method: ANY
          path: '{proxy+}'